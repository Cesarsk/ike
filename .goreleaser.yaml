version: 2
project_name: ike

builds:
  - env:
      - CGO_ENABLED=0
    goos: [darwin, linux] # terminal tool: mac + linux, like k9s in spirit
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github

# Homebrew *formula*, not homebrew_casks: casks are macOS-only and ike ships
# Linux binaries too, so a formula is the only cross-platform option — which is
# why we keep the deprecated `brews` key. Revisit only if goreleaser removes it.
brews:
  - name: ike
    directory: Formula # land at Formula/ike.rb, not the tap root (v2 default)
    homepage: https://github.com/Cesarsk/ike
    description: "k9s-style terminal UI for Datadog — monitors, incidents, SLOs, logs and dashboards with k9s muscle memory"
    license: Apache-2.0
    repository:
      owner: Cesarsk
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    test: |
      assert_match "ike", shell_output("#{bin}/ike --version")
